<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

        /* ===== 设计令牌 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 主色 · 青金石蓝 + 辅助色 · 暖杏 */
            --primary: #2266cc;
            --primary-soft: #4488ee;
            --accent: #ff8a5c;
            --accent-soft: #ffb08c;
            --neutral-100: #f8fafc;
            --neutral-200: #e9edf2;
            --neutral-300: #cbd5e1;
            --neutral-400: #94a3b8;
            --neutral-500: #64748b;
            --neutral-600: #475569;
            --neutral-700: #334155;
            --neutral-800: #1e293b;
            --neutral-900: #0f172a;
            --bg: #ffffff;
            --surface: #f9f9fc;
            --text: var(--neutral-800);
            --text-light: var(--neutral-600);
            --border: var(--neutral-200);
            --card-bg: rgba(255,255,255,0.8);
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-hover: 0 20px 30px -10px rgba(0,0,0,0.15);
            --gradient-bg: linear-gradient(145deg, #ffffff 0%, #f2f5fa 100%);
            --print-bg: white;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 深色模式 */
        [data-theme="dark"] {
            --primary: #4a90e2;
            --primary-soft: #6ba6ff;
            --accent: #ff9f7c;
            --accent-soft: #cc7f5e;
            --neutral-100: #1e293b;
            --neutral-200: #2d3a4f;
            --neutral-300: #3f4e66;
            --neutral-400: #65748c;
            --neutral-500: #8f9fb2;
            --neutral-600: #b1c0d0;
            --neutral-700: #cbd5e1;
            --neutral-800: #e1e8f0;
            --neutral-900: #f1f5f9;
            --bg: #0f172a;
            --surface: #1a2538;
            --text: #e2e8f0;
            --text-light: #a0b3cc;
            --border: #2d3a4f;
            --card-bg: rgba(30, 41, 59, 0.9);
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            --shadow-hover: 0 20px 35px -10px #00000080;
            --gradient-bg: linear-gradient(145deg, #1a2538 0%, #131e2f 100%);
        }

        /* 打印样式 */
        @media print {
            .no-print, .theme-toggle, .print-btn, #back-to-top, nav .nav-center, .contact-btn.copy-mail, #particle-bg, #bg-color {
                display: none !important;
            }
            body, :root {
                background: white !important;
                --bg: white;
                --text: black;
                --border: #ccc;
                --card-bg: white;
                box-shadow: none;
            }
            a, button {
                text-decoration: none;
                color: black;
            }
            .card, .section {
                break-inside: avoid;
                page-break-inside: avoid;
                background: white !important;
                border: 1px solid #ddd;
            }
            .tab-panel {
                display: block !important;
            }
            .tabs-list {
                display: none; 
            }
            .tab-content {
                display: block !important;
                opacity: 1 !important;
            }
            .img-preview {
                max-width: 300px !important;
            }
        }

        body {
            background-color: transparent; /* 改为透明以显示星空背景 */
            color: var(--text);
            line-height: 1.6;
            transition: color 0.2s;
        }

        /* 背景控制层 */
        #bg-color {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-color: var(--bg);
            transition: background-color 0.2s;
        }
        #particle-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 通用布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 导航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: color-mix(in srgb, var(--bg) 75%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 12px 0;
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-center {
            display: flex;
            gap: 8px 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-center a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-center a:hover {
            color: var(--primary);
            background: var(--neutral-200);
        }
        .nav-actions {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: var(--neutral-200);
            border: none;
            color: var(--text);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .icon-btn:hover {
            background: var(--neutral-300);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        /* 主体偏移固定导航 */
        .main-content {
            margin-top: 100px;
        }

        /* Hero 布局 */
        .hero-wrap {
            display: flex;
            align-items: center;
            gap: 40px;
            justify-content: space-between;
        }
        .hero-text {
            flex: 1;
        }
        .hero-img {
            flex-shrink: 0;
            width: 160px;
            border-radius: 12px;
            overflow: hidden;
            border: 6px solid var(--card-bg);
            box-shadow: var(--shadow);
            background: var(--neutral-200);
            position: relative;
        }
        .hero-img img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.3s ease;
        }
        .hero-img:hover img {
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            .hero-wrap {
                flex-direction: column-reverse;
                text-align: center;
            }
            .hero-text {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.25s ease;
            margin-bottom: 24px;
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
            border-color: var(--primary-soft);
        }

        /* 徽章 */
        .badge {
            display: inline-block;
            background: color-mix(in srgb, var(--primary) 10%, transparent);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid color-mix(in srgb, var(--primary) 30%, transparent);
            margin: 0 8px 10px 0;
        }
        .badge.accent {
            background: color-mix(in srgb, var(--accent) 10%, transparent);
            color: var(--accent);
            border-color: color-mix(in srgb, var(--accent) 30%, transparent);
        }

        /* 按钮 */
        .btn {
            background: var(--primary);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* 嵌入图片样式 */
        .img-preview {
            max-width: 100%;
            max-height: 380px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            object-fit: contain;
            transition: transform 0.3s;
            display: block;
        }
        .img-preview:hover {
            transform: scale(1.02);
        }

        /* 证书栅格 */
        .cert-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .cert-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: 0.3s;
        }
        .cert-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--primary-soft);
        }
        .cert-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .cert-card h4 {
            font-size: 1rem;
            color: var(--text);
            margin: 0;
        }

        /* Tabs */
        .tabs-container {
            margin: 20px 0;
        }
        .tabs-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-light);
            border-radius: 40px 40px 0 0;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }
        .tab-btn[aria-selected="true"] {
            color: var(--primary);
            background: color-mix(in srgb, var(--primary) 8%, transparent);
        }
        .tab-btn[aria-selected="true"]::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px 3px 0 0;
        }
        .tab-btn:hover {
            background: var(--neutral-200);
            color: var(--text);
        }
        .tab-panel {
            margin-top: 24px;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 时间线样式 */
        .timeline-item {
            margin-bottom: 24px;
            border-left: 3px solid var(--primary-soft);
            padding-left: 20px;
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -7.5px;
            top: 5px;
            width: 12px;
            height: 12px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50%;
        }

        /* 进度条技能 */
        .skill-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .skill-name {
            width: 100px;
            font-weight: 500;
        }
        .progress-bar {
            flex: 1;
            height: 10px;
            background: var(--neutral-300);
            border-radius: 10px;
            overflow: hidden;
            min-width: 150px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease-out;
        }

        /* 栅格系统 */
        .grid-2, .grid-3 {
            display: grid;
            gap: 24px;
        }
        @media (min-width: 640px) {
            .grid-2 { grid-template-columns: repeat(2,1fr); }
        }
        @media (min-width: 900px) {
            .grid-3 { grid-template-columns: repeat(3,1fr); }
        }

        /* 返回顶部 */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 999;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }
        #back-to-top.visible {
            opacity: 0.9;
            visibility: visible;
            transform: translateY(0);
        }
        #back-to-top:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            color: var(--text-light);
        }
        
        h2 { margin-bottom: 1.5rem; font-size: 1.8rem; }
    </style>
</head>

                    navigator.clipboard?.writeText(email).then(() => {
                        alert('邮箱已复制: ' + email);
                    }).catch(() => alert('请手动复制: ' + email));
                });

                const wechatSpan = el('span', 'badge accent', `💬 微信: ${resume.basic.wechat}`);
                wechatSpan.style.display = 'flex';
                wechatSpan.style.alignItems = 'center';

                contactWrap.append(phoneBtn, emailBtn, wechatSpan);
                textWrap.append(nameTitle, shortBio, badgeWrap, contactWrap);
                
                const imgWrap = el('div', 'hero-img');
                const avatar = el('img');
                avatar.src = resume.basic.avatar;
                avatar.alt = "头像";
                // 若图片加载失败的后备
                avatar.onerror = function() { 
                    this.style.display='none'; 
                    imgWrap.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--text-light);">${resume.basic.name[0]}</div>`;
                };
                imgWrap.appendChild(avatar);

                heroWrap.append(textWrap, imgWrap);
                card.appendChild(heroWrap);
                section.appendChild(card);
                return section;
            }

            // 亮点成果区
            function renderHighlights() {
                const sec = el('section', 'container');
                sec.id = 'highlights';
                sec.innerHTML = '<h2>✨ 量化亮点</h2>';
                const grid = el('div', 'grid-3');
                resume.highlights.forEach(h => {
                    const card = el('div', 'card', h);
                    card.style.fontWeight = '500';
                    card.style.fontSize = '1.05rem';
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                return sec;
            }

            // 经历Tabs (工作/校园)
            function renderExperiences() {
                const sec = el('section', 'container');
                sec.id = 'experiences';
                sec.innerHTML = '<h2>📋 经历</h2>';

                const card = el('div', 'card');
                const tabsContainer = el('div', 'tabs-container');
                const tabsList = el('div', 'tabs-list');
                tabsList.setAttribute('role', 'tablist');

                const tabIds = ['work', 'campus'];
                const tabLabels = ['💼 实习与项目经验', '🎓 校园经历'];

                tabIds.forEach((id, idx) => {
                    const btn = el('button', 'tab-btn', tabLabels[idx]);
                    btn.setAttribute('role', 'tab');
                    btn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
                    btn.setAttribute('aria-controls', `panel-${id}`);
                    btn.id = `tab-${id}`;
                    btn.addEventListener('click', () => switchTab(id));
                    tabsList.appendChild(btn);
                });

                const panelContainer = el('div', 'tab-panel');

                // 工作面板
                const workPanel = el('div', 'tab-content active');
                workPanel.id = 'panel-work';
                workPanel.setAttribute('role', 'tabpanel');
                resume.校外经历.forEach(item => {
                    const it = el('div', 'timeline-item');
                    let content = `
                        <h3 style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
                            <span>${item.title}</span> 
                            <small style="color:var(--text-light); font-weight:normal;">${item.period}</small>
                        </h3>
                        <p style="color:var(--text-light);">${item.desc}</p>
                    `;
                    if (item.image) {
                        content += `<img src="${item.image}" alt="${item.title}" class="img-preview" loading="lazy">`;
                    }
                    it.innerHTML = content;
                    workPanel.appendChild(it);
                });

                // 校园面板
                const campusPanel = el('div', 'tab-content');
                campusPanel.id = 'panel-campus';
                campusPanel.setAttribute('role', 'tabpanel');
                resume.campusActivities.forEach(item => {
                    const it = el('div', 'timeline-item');
                    let content = `
                        <h3 style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
                            <span>${item.title}</span> 
                            <small style="color:var(--text-light); font-weight:normal;">${item.period}</small>
                        </h3>
                        <p style="color:var(--text-light);">${item.desc}</p>
                    `;
                    if (item.image) {
                        content += `<img src="${item.image}" alt="${item.title}" class="img-preview" loading="lazy">`;
                    }
                    it.innerHTML = content;
                    campusPanel.appendChild(it);
                });

                panelContainer.append(workPanel, campusPanel);
                tabsContainer.append(tabsList, panelContainer);
                card.appendChild(tabsContainer);
                sec.appendChild(card);

                function switchTab(activeId) {
                    const btns = tabsList.querySelectorAll('.tab-btn');
                    btns.forEach((btn, index) => {
                        const id = tabIds[index];
                        btn.setAttribute('aria-selected', id === activeId ? 'true' : 'false');
                    });
                    [workPanel, campusPanel].forEach(p => p.classList.remove('active'));
                    document.getElementById(`panel-${activeId}`).classList.add('active');
                }

                // 键盘切换
                tabsContainer.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                        const current = tabsList.querySelector('[aria-selected="true"]');
                        const items = Array.from(tabsList.querySelectorAll('.tab-btn'));
                        let idx = items.indexOf(current);
                        if (e.key === 'ArrowLeft') idx = (idx - 1 + items.length) % items.length;
                        else idx = (idx + 1) % items.length;
                        items[idx].click();
                        items[idx].focus();
                        e.preventDefault();
                    }
                });

                return sec;
            }

            // 项目Tabs
            function renderProjects() {
                const sec = el('section', 'container');
                sec.id = 'projects';
                sec.innerHTML = '<h2>🛠️ 个人项目</h2>';
                const grid = el('div', 'grid-3');
                resume.projects.forEach(p => {
                    const card = el('div', 'card');
                    let linkHtml = p.link !== '#' ? `<div style="margin-top:12px;"><a href="${p.link}" target="_blank" style="color:var(--primary); font-weight:bold; text-decoration:none; display:inline-flex; align-items:center; gap:4px;">🔗 点击访问项目网页</a></div>` : '';
                    card.innerHTML = `
                        <h3 style="font-size:1.2rem; margin-bottom:8px;">${p.name}</h3>
                        <span class="badge" style="margin-bottom:12px;">${p.stack}</span>
                        <p style="color:var(--text-light); margin-bottom:16px;">${p.result}</p>
                        ${linkHtml}
                    `;
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                return sec;
            }

            // 技能矩阵 
            function renderSkills() {
                const sec = el('section', 'container');
                sec.id = 'skills';
                sec.innerHTML = '<h2>📊 技能矩阵</h2>';
                const grid = el('div', 'grid-2');

                const groups = [
                    { title: "开发与AI平台", data: resume.skills.frameworks },
                    { title: "专业领域", data: resume.skills.domains },
                    { title: "生产力工具", data: resume.skills.tools },
                    { title: "语言能力", data: resume.skills.languages }
                ];

                groups.forEach(group => {
                    const card = el('div', 'card');
                    card.innerHTML = `<h3 style="margin-bottom:20px; font-size:1.2rem;">${group.title}</h3>`;
                    group.data.forEach(s => {
                        const div = el('div', 'skill-item');
                        div.innerHTML = `
                            <span class="skill-name">${s.name}</span>
                            <div class="progress-bar"><div class="progress-fill" style="width:0%;" data-width="${s.level}%"></div></div>
                        `;
                        card.appendChild(div);
                    });
                    grid.appendChild(card);
                });

                sec.appendChild(grid);
                return sec;
            }

            // 教育与证书
            function renderEduCert() {
                const sec = el('section', 'container');
                sec.id = 'education';
                const card = el('div', 'card');
                
                // 教育部分
                card.innerHTML = `
                    <h2>🎓 教育背景</h2>
                    <div style="border-left: 3px solid var(--primary-soft); padding-left: 20px; margin-bottom: 30px;">
                        <h3 style="font-size:1.3rem; margin-bottom:4px; display:flex; justify-content:space-between; flex-wrap:wrap;">
                            <span>${resume.education.school}</span>
                            <span style="font-size:1rem; color:var(--text-light); font-weight:normal;">${resume.education.period}</span>
                        </h3>
                        <p style="font-size:1.1rem; margin-bottom:8px;">${resume.education.major} · ${resume.education.degree}</p>
                        <p style="color:var(--text-light);"><strong>主修课程：</strong>${resume.education.courses.join(' · ')}</p>
                    </div>
                `;

                // 证书部分
                const certHeader = el('h2', '', '📜 资质与证书');
                certHeader.style.marginTop = '40px';
                card.appendChild(certHeader);

                const certGrid = el('div', 'cert-grid');
                resume.certificates.forEach(c => {
                    const certCard = el('div', 'cert-card');
                    certCard.innerHTML = `
                        <img src="${c.image}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
                        <h4>${c.name}</h4>
                    `;
                    certGrid.appendChild(certCard);
                });
                card.appendChild(certGrid);
                sec.appendChild(card);
                return sec;
            }

            // 页脚
            function renderFooter() {
                return el('footer', 'footer', `© ${new Date().getFullYear()} ${resume.basic.name} · 最后更新 ${new Date().toLocaleDateString('zh-CN')} <br><small style="opacity:0.6; margin-top:8px; display:inline-block;">Powered by Nocode & Handcrafted HTML</small>`);
            }

            // 返回顶部按钮
            function renderBackToTop() {
                const btn = el('button', '', `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                `);
                btn.id = 'back-to-top';
                btn.setAttribute('aria-label', '返回顶部');
                btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
                
                // 滚动监听显隐
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) btn.classList.add('visible');
                    else btn.classList.remove('visible');
                });
                return btn;
            }

            // 星空粒子背景特效
            function initParticleBackground() {
                const canvas = document.getElementById('particle-bg');
                const ctx = canvas.getContext('2d');
                let width, height, particles;

                function resize() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                    particles = [];
                    // 控制粒子密度
                    const particleCount = Math.floor((width * height) / 12000); 
                    for (let i = 0; i < particleCount; i++) {
                        particles.push({
                            x: Math.random() * width,
                            y: Math.random() * height,
                            r: Math.random() * 1.5 + 0.5,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3
                        });
                    }
                }

                function draw() {
                    ctx.clearRect(0, 0, width, height);
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    // 动态调整粒子颜色：深色模式用白星，浅色模式用蓝星
                    ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(34, 102, 204, 0.3)';
                    
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        // 边界环绕
                        if (p.x < 0) p.x = width;
                        if (p.x > width) p.x = 0;
                        if (p.y < 0) p.y = height;
                        if (p.y > height) p.y = 0;
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    requestAnimationFrame(draw);
                }

                window.addEventListener('resize', resize);
                resize();
                draw();
            }

            // 组装页面
            function buildPage() {
                const fragment = document.createDocumentFragment();
                fragment.appendChild(renderNav());
                const main = el('main', 'main-content');
                main.appendChild(renderHero());
                main.appendChild(renderHighlights());
                main.appendChild(renderExperiences());
                main.appendChild(renderProjects());
                main.appendChild(renderSkills());
                main.appendChild(renderEduCert());
                main.appendChild(renderFooter());
                fragment.appendChild(main);
                fragment.appendChild(renderBackToTop());
                return fragment;
            }

            root.innerHTML = '';
            root.appendChild(buildPage());

            // 技能条动画
            setTimeout(() => {
                const fills = document.querySelectorAll('.progress-fill');
                fills.forEach(fill => {
                    fill.style.width = fill.getAttribute('data-width');
                });
            }, 300);

            // 深浅色切换
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                html.setAttribute('data-theme', 'dark');
            }
            themeToggle.addEventListener('click', () => {
                const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
            });

            // 启动粒子背景
            initParticleBackground();

            // 打印
            document.getElementById('printResume').addEventListener('click', () => window.print());

        })();
    </script>
</body>
